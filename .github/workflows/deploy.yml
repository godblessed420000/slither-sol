name: Deploy to Vercel

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stamp build version
        run: |
          BUILD="$(date +'%b %-d %Y %H:%M UTC')"
          # Replace the JS variable line
          sed -i "s/var GAME_BUILD = .*/var GAME_BUILD = '${BUILD}';/" index.html
          # Replace all date-format version strings: "Mon DD YYYY HH:MM UTC"
          sed -i -E "s/[A-Z][a-z]{2} [0-9]{1,2} [0-9]{4} [0-9]{2}:[0-9]{2} UTC/${BUILD}/g" index.html
          echo "Stamped: ${BUILD}"
          grep "loginVersionText" index.html | grep -o 'Jun.*UTC\|[A-Z][a-z].*UTC' | head -1 || echo "(not found)"
          grep "headerVersionText" index.html | grep -o 'Jun.*UTC\|[A-Z][a-z].*UTC' | head -1 || echo "(not found)"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        run: vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
