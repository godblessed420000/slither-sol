name: Deploy to Vercel

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stamp build version
        run: |
          BUILD="V2"
          # Update the JS config variable (drives all version displays at runtime)
          sed -i "s/var GAME_BUILD = .*/var GAME_BUILD = '${BUILD}';/" index.html
          # Update static HTML placeholders (visible before JS loads)
          sed -i "s|<title>SLITHER\.SOL — V[0-9]*</title>|<title>SLITHER.SOL — ${BUILD}</title>|g" index.html
          sed -i "s|document\.title = 'SLITHER\.SOL — V[0-9]*';|document.title = 'SLITHER.SOL — ${BUILD}';|g" index.html
          echo "Stamped: ${BUILD}"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        run: vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
