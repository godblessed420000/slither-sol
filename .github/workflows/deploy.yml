name: Deploy to GitHub Pages (DISABLED — site is on Vercel)

# DISABLED 2026-07-01. slither-sol.com is served by Vercel, which auto-deploys
# from the repo on every push. This workflow deployed to GitHub Pages (a dead
# host the domain never points at) and stamped GAME_BUILD into the Pages artifact
# only — the live Vercel site never saw it, so the build number appeared stuck.
# Trigger is now manual-only so it never auto-runs. GAME_BUILD in index.html is
# the source of truth; bump it there. Do NOT restore the push trigger.
on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp and bump version
        run: |
          VER=$(cat VERSION)
          BUILD="V${VER}"
          sed -i "s/var GAME_BUILD = .*/var GAME_BUILD = '${BUILD}';/" index.html
          echo $((VER + 1)) > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --cached --quiet || git commit -m "chore: bump VERSION to $((VER + 1))"
          git push
          echo "Stamped: ${BUILD}"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
